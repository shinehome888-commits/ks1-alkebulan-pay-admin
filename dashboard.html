<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>KS1 ALKEBULAN PAY – Admin Dashboard</title>
  <style>
    body { background: #050A16; color: white; font-family: sans-serif; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; margin: 10px 0; }
    .btn { background: #D4AF37; color: #000; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    .logout { background: #ff4d4d; }
    h1 { color: #D4AF37; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>KS1 Admin Dashboard</h1>
    <div id="admin-info" class="card">Loading...</div>
    
    <div class="card">
      <h3>Admin Actions</h3>
      <button class="btn" onclick="viewUsers()">View All Users</button>
      <button class="btn" onclick="viewTrades()">Monitor Trades</button>
      <button class="btn" onclick="viewAnalytics()">System Analytics</button>
    </div>

    <button class="btn logout" onclick="logout()">Logout</button>
  </div>

  <script>
    const token = localStorage.getItem('ks1_jwt_token');
    if (!token) {
      alert('Please log in first.');
      window.location.href = 'https://ks1-alkebulan-pay-identity-hub.pages.dev';
    }

    async function loadAdminProfile() {
      try {
        const res = await fetch('https://ks1-central-auth.onrender.com/auth/verify', {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Invalid session');
        const user = await res.json();
        
        if (user.role !== 'admin') {
          alert('Admin access required.');
          window.location.href = 'https://ks1-alkebulan-pay-identity-hub.pages.dev';
        }

        document.getElementById('admin-info').innerHTML = `
          <p><strong>Admin ID:</strong> ${user.user_id}</p>
          <p><strong>Role:</strong> ${user.role}</p>
          <p>Status: ✅ Authorized</p>
        `;
      } catch (err) {
        alert('Access denied: ' + err.message);
        window.location.href = 'https://ks1-alkebulan-pay-identity-hub.pages.dev';
      }
    }

    function logout() {
      localStorage.removeItem('ks1_jwt_token');
      window.location.href = 'https://ks1-alkebulan-pay-identity-hub.pages.dev';
    }

    // Placeholder functions — connect to your backend APIs later
    function viewUsers() { alert('User management coming soon'); }
    function viewTrades() { alert('Trade monitoring coming soon'); }
    function viewAnalytics() { alert('Analytics coming soon'); }

    loadAdminProfile();
  </script>
</body>
</html>
